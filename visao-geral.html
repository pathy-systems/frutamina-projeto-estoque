<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Estoque CD" />
    <title>Visão Geral</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./assets/img/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Source+Sans+3:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" href="styles.css?v=20260422-7" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body data-page="dashboard">
    <!-- Dashboard historico do CD com graficos e comparacao da ultima contagem. -->
    <aside id="app-sidebar" class="sidebar" aria-label="Navegacao principal">
      <div class="sidebar-top">
        <img src="assets/img/logo.webp" alt="Frutamina" class="sidebar-logo" />
      </div>
      <nav class="sidebar-nav">
        <button id="menu-view" class="ghost" data-href="index.html" type="button">
          <i class="bi bi-box-seam"></i>
          <span class="sidebar-label">Estoque</span>
        </button>
        <button id="menu-dashboard" class="primary" type="button">
          <i class="bi bi-bar-chart-line"></i>
          <span class="sidebar-label">Visao geral</span>
        </button>
        <button id="menu-count" class="ghost" data-href="editar.html" type="button">
          <i class="bi bi-pencil-square"></i>
          <span class="sidebar-label">Editar estoque</span>
        </button>
        <button id="menu-products" class="ghost" data-href="produtos.html" type="button">
          <i class="bi bi-boxes"></i>
          <span class="sidebar-label">Produtos</span>
        </button>
      </nav>
      <div class="sidebar-footer">
        <div id="menu-user" class="user-chip hidden">
          <span>Usuario</span>
          <strong id="menu-user-email">--</strong>
        </div>
        <button id="menu-logout" class="ghost hidden" type="button">
          <i class="bi bi-box-arrow-right"></i>
          <span class="sidebar-label">Sair</span>
        </button>
      </div>
    </aside>
    <div id="sidebar-overlay" class="sidebar-overlay" aria-hidden="true"></div>
    <div class="app">
      <header class="mobile-topbar">
        <img src="assets/img/logo.webp" alt="Frutamina" class="mobile-topbar-logo" />
        <button
          id="sidebar-toggle"
          class="sidebar-toggle"
          type="button"
          aria-label="Abrir menu"
          aria-expanded="false"
        >
          <i class="bi bi-list"></i>
        </button>
      </header>
      <!-- Cabecalho visual da pagina. -->
      <header class="hero">
        <div>
          <img src="assets/img/logo.webp" alt="logo" class="logo" />
          <p class="eyebrow">CD | Contagem do estoque</p>
          <h1>Visão Geral</h1>
        </div>
      </header>

      <!-- Painel do dashboard: total de caixas, saida do CD e comparacao. -->
      <section id="dashboard-panel" class="grid">
        <!-- Grafico principal de total de caixas do CD. -->
        <section class="card full dashboard-card">
          <div class="dashboard-header">
            <div>
              <p class="eyebrow">Movimentação do CD</p>
              <h2 class="dashboard-title">Total de caixas</h2>
            </div>
          </div>
          <div class="chart-summary">
            <div class="chart-main-value" id="chart-total-value">--</div>
            <div class="chart-sub" id="chart-total-change">--</div>
            <div class="chart-sub chart-date" id="chart-total-date">--</div>
          </div>
          <div class="chart-range" id="chart-range">
            <button class="range-btn active" data-range="1D">1D</button>
            <button class="range-btn" data-range="5D">5D</button>
            <button class="range-btn" data-range="1M">1M</button>
            <button class="range-btn" data-range="6M">6M</button>
            <button class="range-btn" data-range="1Y">1Y</button>
            <button class="range-btn" data-range="5Y">5Y</button>
            <button class="range-btn" data-range="MAX">Max</button>
          </div>
          <div class="chart-wrap chart-dark">
            <canvas id="chart-total" width="900" height="260"></canvas>
            <div class="chart-tooltip" id="chart-total-tooltip"></div>
          </div>
        </section>

        <!-- Grafico de caixas que sairam entre uma contagem e outra. -->
        <section class="card full dashboard-card">
          <div class="dashboard-header">
            <div>
              <p class="eyebrow">Saída do CD</p>
              <h2 class="dashboard-title">Caixas que saíram</h2>
            </div>
          </div>
          <div class="chart-summary">
            <div class="chart-main-value" id="chart-outflow-value">--</div>
            <div class="chart-sub" id="chart-outflow-change">--</div>
            <div class="chart-sub chart-date" id="chart-outflow-date">--</div>
          </div>
          <div class="chart-wrap chart-dark">
            <canvas id="chart-outflow" width="900" height="260"></canvas>
            <div class="chart-tooltip" id="chart-outflow-tooltip"></div>
          </div>
        </section>
        <!-- Relatorio detalhado do que saiu na ultima comparacao salva. -->
        <section class="card full comparison-card">
          <div class="card-header">
            <h2>Saidas da ultima contagem</h2>
            <p id="comparison-meta">Ainda nao existe comparacao salva.</p>
          </div>
          <div id="comparison-body"></div>
        </section>
      </section>
    </div>

    <script src="assets/app.js?v=20260422-3"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("./service-worker.js")
            .catch((error) => console.warn("Falha ao registrar service worker.", error));
        });
      }
    </script>
  </body>
</html>
