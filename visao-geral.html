<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Visão Geral</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Source+Sans+3:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body data-page="dashboard">
    <div class="app">
      <header class="hero">
        <div>
          <img src="assets/img/logo.webp" alt="logo" class="logo" />
          <p class="eyebrow">CD | Contagem do estoque</p>
          <h1>Visão Geral</h1>
        </div>
      </header>

      <nav class="menu">
        <button id="menu-view" class="ghost" data-href="index.html">Estoque</button>
        <button id="menu-dashboard" class="primary">Visão geral</button>
        <button id="menu-count" class="ghost" data-href="editar.html">Editar estoque</button>
        <div id="menu-user" class="user-chip hidden">
          <span>Usuário</span>
          <strong id="menu-user-email">--</strong>
        </div>
        <button id="menu-logout" class="ghost hidden">Sair</button>
      </nav>

      <section id="dashboard-panel" class="grid">
        <section class="card full dashboard-card">
          <div class="dashboard-header">
            <div>
              <p class="eyebrow">Movimentação do CD</p>
              <h2 class="dashboard-title">Total de caixas</h2>
            </div>
          </div>
          <div class="chart-summary">
            <div class="chart-main-value" id="chart-total-value">--</div>
            <div class="chart-sub" id="chart-total-change">--</div>
            <div class="chart-sub chart-date" id="chart-total-date">--</div>
          </div>
          <div class="chart-range" id="chart-range">
            <button class="range-btn active" data-range="1D">1D</button>
            <button class="range-btn" data-range="5D">5D</button>
            <button class="range-btn" data-range="1M">1M</button>
            <button class="range-btn" data-range="6M">6M</button>
            <button class="range-btn" data-range="1Y">1Y</button>
            <button class="range-btn" data-range="5Y">5Y</button>
            <button class="range-btn" data-range="MAX">Max</button>
          </div>
          <div class="chart-wrap chart-dark">
            <canvas id="chart-total" width="900" height="260"></canvas>
            <div class="chart-tooltip" id="chart-total-tooltip"></div>
          </div>
        </section>

        <section class="card full dashboard-card">
          <div class="dashboard-header">
            <div>
              <p class="eyebrow">Saída do CD</p>
              <h2 class="dashboard-title">Caixas que saíram</h2>
            </div>
          </div>
          <div class="chart-summary">
            <div class="chart-main-value" id="chart-outflow-value">--</div>
            <div class="chart-sub" id="chart-outflow-change">--</div>
            <div class="chart-sub chart-date" id="chart-outflow-date">--</div>
          </div>
          <div class="chart-wrap chart-dark">
            <canvas id="chart-outflow" width="900" height="260"></canvas>
            <div class="chart-tooltip" id="chart-outflow-tooltip"></div>
          </div>
        </section>
      </section>
    </div>

    <script src="assets/app.js?v=20260318-18"></script>
  </body>
</html>
